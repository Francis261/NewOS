<!doctype html><html><body>
<div class="app-shell">
  <h3>Settings</h3>
  <label><input type="checkbox" id="sync"/> Enable cloud sync (when online)</label><br/>
  <button id="save">Save</button>
  <h4>WASM test</h4>
  <button id="wasm">Run local WASM add(20,22)</button>
  <pre id="out"></pre>
</div>
<script>
const wasmBytes = new Uint8Array([0,97,115,109,1,0,0,0,1,7,1,96,2,127,127,1,127,3,2,1,0,7,7,1,3,97,100,100,0,0,10,9,1,7,0,32,0,32,1,106,11]);
document.getElementById('save').onclick=()=>{
  localStorage.setItem('webos.sync', document.getElementById('sync').checked ? '1':'0');
};
document.getElementById('sync').checked=localStorage.getItem('webos.sync')==='1';
document.getElementById('wasm').onclick=async()=>{
 const mod=await WebAssembly.instantiate(wasmBytes,{});
 document.getElementById('out').textContent=String(mod.instance.exports.add(20,22));
};
</script>
</body></html>
