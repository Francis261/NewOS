<!doctype html><html><body>
<div class="app-shell">
  <h3>File Manager</h3>
  <input id="fname" placeholder="filename.txt" />
  <button id="newf">Create Empty File</button>
  <button id="refresh">Refresh</button>
  <ul id="list"></ul>
</div>
<script>
const appId = new URLSearchParams(location.search).get('appId') || 'file-manager';
let token='';
async function getToken(){
  if(token) return token;
  const r=await fetch('/api/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({appId})});
  token=(await r.json()).token;
  return token;
}
async function list(){
  const t=await getToken();
  const r=await fetch('/api/fs/list?path=',{headers:{'X-WebOS-Token':t}});
  const items=await r.json();
  const ul=document.getElementById('list'); ul.innerHTML='';
  for(const it of items){
    const li=document.createElement('li');
    li.textContent=`${it.type}: ${it.name} `;
    const del=document.createElement('button'); del.textContent='Delete';
    del.onclick=async()=>{await fetch('/api/fs/delete',{method:'POST',headers:{'Content-Type':'application/json','X-WebOS-Token':t},body:JSON.stringify({path:it.name})}); list();};
    li.appendChild(del); ul.appendChild(li);
  }
}
document.getElementById('newf').onclick=async()=>{
  const name=document.getElementById('fname').value.trim(); if(!name) return;
  const t=await getToken();
  await fetch('/api/fs/write',{method:'POST',headers:{'Content-Type':'application/json','X-WebOS-Token':t},body:JSON.stringify({path:name,content:''})});
  list();
};
document.getElementById('refresh').onclick=list;
list();
</script>
</body></html>
