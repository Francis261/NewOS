<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MyOS</title>
    <style>
      body { margin:0; font-family:system-ui,sans-serif; background:#111827; color:#e5e7eb; }
      #taskbar { position:fixed; left:0; right:0; bottom:0; height:48px; background:#1f2937; display:flex; align-items:center; gap:8px; padding:0 10px; }
      .btn { background:#374151; color:#f9fafb; border:0; border-radius:6px; padding:8px 10px; cursor:pointer; }
      #desktop { position:fixed; inset:0 0 48px 0; padding:16px; }
      .window { background:#0b1220; border:1px solid #334155; border-radius:8px; padding:10px; max-width:720px; }
    </style>
  </head>
  <body>
    <div id="desktop">
      <div class="window">
        <h1>MyOS Desktop</h1>
        <p>This is the lightweight fallback desktop. Replace with your React/Tauri build artifacts.</p>
      </div>
    </div>
    <div id="taskbar">
      <button class="btn">Launcher</button>
      <button class="btn">Browser</button>
      <button class="btn">Terminal</button>
    </div>
  </body>
</html>
