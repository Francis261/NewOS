name: Build Full NewOS ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
    paths:
      - "tools/build-full-webos-iso.sh"
      - "rootfs/**"
      - "iso/**"
      - ".github/workflows/build-full-iso.yml"

jobs:
  build-full-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build full ISO
        run: |
          sudo --preserve-env=SQUASHFS_COMP,SQUASHFS_BLOCK_SIZE ./tools/build-full-webos-iso.sh

      - name: Show ISO details
        run: |
          ls -lh dist/newos-full.iso
          file dist/newos-full.iso
          xorriso -indev dist/newos-full.iso -report_el_torito plain

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: newos-full-iso
          path: dist/newos-full.iso
          if-no-files-found: error
          retention-days: 7
