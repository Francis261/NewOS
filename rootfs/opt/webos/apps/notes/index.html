<!doctype html><html><body>
<div class="app-shell">
  <h3>Notes</h3>
  <textarea id="txt" style="width:100%;height:220px"></textarea>
  <button id="save">Save</button>
  <span id="status"></span>
</div>
<script>
const appId = new URLSearchParams(location.search).get('appId') || 'notes';
let token='';
async function getToken(){
 if(token) return token;
 const r=await fetch('/api/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({appId})});
 token=(await r.json()).token; return token;
}
async function api(method, url, body){
 const t=await getToken();
 const opts={method,headers:{'X-WebOS-Token':t}};
 if(body){opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body);} 
 const r=await fetch(url,opts);
 return r.json();
}
(async()=>{
  const out = await api('GET','/api/fs/read?path=note.txt').catch(()=>null);
  if(out && out.content) document.getElementById('txt').value = out.content;
})();
document.getElementById('save').onclick=async()=>{
 await api('POST','/api/fs/write',{path:'note.txt',content:document.getElementById('txt').value});
 document.getElementById('status').textContent='Saved';
 setTimeout(()=>document.getElementById('status').textContent='',1000);
};
</script>
</body></html>
